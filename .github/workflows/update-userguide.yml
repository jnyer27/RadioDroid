name: Update User Guide

# ── Triggers ──────────────────────────────────────────────────────────────────
# 1. Every published GitHub Release — checks out main, builds MkDocs, gh-deploy.
#    **Pitfall:** main must already have userguide.md "Current release: vX.Y.Z" matching
#    versionName in app/build.gradle.kts, or the verify step fails (no stale Pages).
#    PDFs attach to releases; notes get footer once (marker: radiodroid-docs:userguide).
# 2. Push to main when userguide.md / docs / mkdocs.yml / requirements-docs.txt
#    change — redeploys Pages and backfills PDFs onto all published releases.
# 3. workflow_dispatch — same as (2); no version verify (manual backfill).
on:
  release:
    types: [published]
  push:
    branches:
      - main
    paths:
      - 'userguide.md'
      - 'privacypolicy.md'
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - '.github/workflows/update-userguide.yml'
  workflow_dispatch:

# ── Permissions ───────────────────────────────────────────────────────────────
permissions:
  contents: write    # needed to upload/replace release assets + push gh-pages

concurrency:
  group: userguide-pages
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: Build PDF & deploy docs
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout (always main — PDF is current guide, distributed on every release)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0   # full history needed for gh-deploy

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'requirements-docs.txt'

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install MkDocs + exporter
        run: pip install -r requirements-docs.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      # ── 4. On release: userguide must match app version (this job builds main as-is)
      - name: Verify userguide Current release matches versionName (release only)
        if: github.event_name == 'release'
        run: |
          set -euo pipefail
          VERSION=$(grep 'versionName' AndroidRadioDroid/app/build.gradle.kts | head -1 | sed -n 's/.*"\([^"]*\)".*/\1/p')
          if [[ -z "${VERSION}" ]]; then
            echo "::error::Could not parse versionName from AndroidRadioDroid/app/build.gradle.kts"
            exit 1
          fi
          if ! grep -F "Current release: v${VERSION}" userguide.md; then
            echo "::error::userguide.md must contain **Current release: v${VERSION}** matching versionName on main. Push userguide.md + docs/UserGuide.md, then re-run \"Update User Guide\" or republish."
            exit 1
          fi
          echo "OK: userguide matches versionName v${VERSION}"

      # ── 5. Build site + PDF ───────────────────────────────────────────────────
      - name: Build MkDocs site (generates site/user-guide.pdf)
        run: python -m mkdocs build

      - name: Verify PDF was generated
        run: |
          ls -lh site/user-guide.pdf
          echo "PDF_SIZE=$(du -k site/user-guide.pdf | cut -f1) KB" >> $GITHUB_STEP_SUMMARY

      # ── 6. Deploy updated GitHub Pages ────────────────────────────────────────
      - name: Deploy to GitHub Pages
        run: python -m mkdocs gh-deploy --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 7. Attach PDF to releases (this tag or backfill all) ─────────────────
      - name: Publish User Guide PDF to GitHub Releases
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "${{ github.event.release.tag_name }}" > /tmp/release-tags.txt
          else
            # Do not use `gh ... --jq -r` — gh parses `-r` as --repo, not jq raw output.
            gh release list -L 500 --json tagName | jq -r '.[].tagName' > /tmp/release-tags.txt
          fi

          COUNT=0
          while IFS= read -r TAG || [[ -n "${TAG:-}" ]]; do
            [[ -z "${TAG// }" ]] && continue
            TAG="${TAG//[$'\t\r\n']}"
            echo "Processing release: $TAG"
            FILENAME="radiodroid-${TAG}-userguide.pdf"
            cp site/user-guide.pdf "$FILENAME"

            gh release view "$TAG" --json assets 2>/dev/null | jq -r '.assets[].name // empty' | while read -r asset; do
              [[ -z "$asset" ]] && continue
              [[ "$asset" == *userguide*.pdf ]] || continue
              echo "  Removing old asset: $asset"
              gh release delete-asset "$TAG" "$asset" --yes || true
            done

            gh release upload "$TAG" "$FILENAME#User Guide (PDF)"
            echo "  Uploaded $FILENAME"
            rm -f "$FILENAME"

            # Append online user guide + PDF links to release notes (idempotent)
            BODY=$(gh release view "$TAG" --json body | jq -r '.body // empty')
            if [[ "$BODY" == *'<!-- radiodroid-docs:userguide -->'* ]]; then
              echo "  Release notes already include user guide links"
            else
              PDF_NAME="radiodroid-${TAG}-userguide.pdf"
              FOOTER="$(printf '%s\n' '' '<!-- radiodroid-docs:userguide -->' '### User guide' \
                '- **Online (MkDocs):** https://jnyer27.github.io/RadioDroid/' \
                "- **PDF (this release):** File **${PDF_NAME}** in Assets below" \
                '- **PDF (live on GitHub Pages):** https://jnyer27.github.io/RadioDroid/user-guide.pdf')"
              printf '%s%s' "$BODY" "$FOOTER" > "/tmp/release-notes-${TAG}.md"
              gh release edit "$TAG" --notes-file "/tmp/release-notes-${TAG}.md"
              echo "  Appended user guide links to release notes"
            fi

            COUNT=$((COUNT + 1))
          done < /tmp/release-tags.txt

          echo "PROCESSED_COUNT=$COUNT" >> "$GITHUB_ENV"
          echo "### Releases updated: $COUNT" >> "$GITHUB_STEP_SUMMARY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 8. Summary ────────────────────────────────────────────────────────────
      - name: Summarise
        run: |
          echo "### User Guide pipeline" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Site:** https://jnyer27.github.io/RadioDroid/" >> "$GITHUB_STEP_SUMMARY"
          echo "- **PDF (live):** https://jnyer27.github.io/RadioDroid/user-guide.pdf" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Releases refreshed:** ${{ env.PROCESSED_COUNT }}" >> "$GITHUB_STEP_SUMMARY"
