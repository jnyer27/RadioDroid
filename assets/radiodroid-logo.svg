<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" role="img" aria-labelledby="title desc">
  <title id="title">RadioDroid</title>
  <desc id="desc">RadioDroid  Android CHIRP-compatible radio programmer</desc>
  <defs>
    <linearGradient id="rd-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976D2"/>
      <stop offset="100%" style="stop-color:#0D47A1"/>
    </linearGradient>
  </defs>
  <!-- Mast and feed point -->
  <line x1="36" y1="82" x2="36" y2="38" stroke="url(#rd-blue)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="36" cy="32" r="7" fill="#FF9800"/>
  <!-- Signal arcs -->
  <path d="M 48 56 Q 58 40 72 56 Q 58 72 48 56" fill="none" stroke="#1976D2" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <path d="M 54 56 Q 66 34 86 56 Q 66 78 54 56" fill="none" stroke="#1976D2" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <!-- Wordmark -->
  <text x="102" y="62" font-family="Segoe UI, Roboto, Helvetica Neue, Arial, sans-serif" font-size="34" font-weight="700" fill="url(#rd-blue)">RadioDroid</text>
  <text x="104" y="86" font-family="Segoe UI, Roboto, Helvetica Neue, Arial, sans-serif" font-size="11.5" fill="#555">CHIRP programmer · USB &amp; Bluetooth LE</text>
</svg>
